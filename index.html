<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Intelligences Diagnostic Test</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons for graphics -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Custom print styles to ensure colors show up on the PDF */
        @media print {
            .print-exact {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            body {
                background-color: white !important;
            }
            .print-break-inside-avoid {
                break-inside: avoid;
            }
        }
        
        /* Smooth fade transition */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 font-sans p-4 md:p-8 flex items-center justify-center">

    <div class="max-w-3xl w-full bg-white rounded-2xl shadow-xl overflow-hidden" id="app-container">
        <!-- Content will be injected here by JavaScript -->
    </div>

    <script>
        // --- DATA DEFINITIONS ---
        const intelligenceDetails = {
            Linguistic: { icon: 'brain', color: 'bg-blue-500', textColor: 'text-blue-600', description: "Word Smart: You excel in words, language, and writing. You learn best by reading, taking notes, and listening to lectures." },
            Logical: { icon: 'calculator', color: 'bg-red-500', textColor: 'text-red-600', description: "Number/Reasoning Smart: You excel in math and logical problem-solving. You learn best by categorizing, classifying, and working with abstract patterns." },
            Spatial: { icon: 'palette', color: 'bg-purple-500', textColor: 'text-purple-600', description: "Picture Smart: You are highly visual and excel in art or navigation. You learn best by looking at pictures, watching videos, and using spatial understanding." },
            Kinesthetic: { icon: 'activity', color: 'bg-orange-500', textColor: 'text-orange-600', description: "Body Smart: You excel in physical activities, sports, or hands-on tasks. You learn best by doing, touching, and moving." },
            Musical: { icon: 'music', color: 'bg-pink-500', textColor: 'text-pink-600', description: "Music Smart: You have a strong sense of rhythm and pitch. You learn best through melody, beats, and auditory patterns." },
            Interpersonal: { icon: 'users', color: 'bg-teal-500', textColor: 'text-teal-600', description: "People Smart: You excel in interacting with others, empathy, and leadership. You learn best by collaborating, discussing, and working in groups." },
            Intrapersonal: { icon: 'user-circle', color: 'bg-indigo-500', textColor: 'text-indigo-600', description: "Self Smart: You have deep self-awareness and understand your own emotions/goals. You learn best by working independently and reflecting." },
            Naturalist: { icon: 'tree-pine', color: 'bg-green-500', textColor: 'text-green-600', description: "Nature Smart: You easily recognize and categorize plants, animals, and nature. You learn best when subjects are connected to the natural world." }
        };

        const questions = [
            { id: 1, category: 'Linguistic', text: 'I enjoy reading books, articles, or stories in my free time.' },
            { id: 2, category: 'Logical', text: 'I enjoy solving puzzles, riddles, or complex math problems.' },
            { id: 3, category: 'Spatial', text: 'I can easily visualize objects, maps, or pictures in my mind.' },
            { id: 4, category: 'Kinesthetic', text: 'I learn new skills best by actually doing them rather than just reading about them.' },
            { id: 5, category: 'Musical', text: 'I often find myself tapping to a beat or humming a tune.' },
            { id: 6, category: 'Interpersonal', text: 'I prefer working in a team or group rather than working completely alone.' },
            { id: 7, category: 'Intrapersonal', text: 'I need quiet time to process my feelings and thoughts.' },
            { id: 8, category: 'Naturalist', text: 'I feel most energized and relaxed when I am outdoors in nature.' },
            
            { id: 9, category: 'Linguistic', text: 'I find it easy to explain my ideas to others using words.' },
            { id: 10, category: 'Logical', text: 'I like to know how things work and look for logical patterns.' },
            { id: 11, category: 'Spatial', text: 'I enjoy drawing, painting, or expressing myself visually.' },
            { id: 12, category: 'Kinesthetic', text: 'I use a lot of hand gestures and body language when I talk.' },
            { id: 13, category: 'Musical', text: 'I can easily remember melodies or lyrics to songs I hear.' },
            { id: 14, category: 'Interpersonal', text: 'People often come to me for advice or to help resolve conflicts.' },
            { id: 15, category: 'Intrapersonal', text: 'I have a very clear understanding of my own strengths and weaknesses.' },
            { id: 16, category: 'Naturalist', text: 'I am highly observant of changes in the weather, plants, or animals around me.' },
            
            { id: 17, category: 'Linguistic', text: 'I enjoy playing word games like Scrabble or doing crossword puzzles.' },
            { id: 18, category: 'Logical', text: 'I prefer things to be organized in a systematic, step-by-step way.' },
            { id: 19, category: 'Spatial', text: 'I am good at reading maps and rarely get lost in new places.' },
            { id: 20, category: 'Kinesthetic', text: 'I find it difficult to sit still for long periods of time.' },
            { id: 21, category: 'Musical', text: 'I can tell when a musical note is off-key.' },
            { id: 22, category: 'Interpersonal', text: 'I can easily pick up on how other people are feeling without them telling me.' },
            { id: 23, category: 'Intrapersonal', text: 'I prefer to set my own goals and work independently to achieve them.' },
            { id: 24, category: 'Naturalist', text: 'I enjoy gardening, caring for pets, or watching nature documentaries.' }
        ];

        const options = [
            { val: 1, label: 'Strongly Disagree' },
            { val: 2, label: 'Disagree' },
            { val: 3, label: 'Neutral' },
            { val: 4, label: 'Agree' },
            { val: 5, label: 'Strongly Agree' }
        ];

        // --- APP STATE ---
        let currentState = 'intro'; // 'intro', 'test', 'results'
        let currentQIndex = 0;
        let answers = {}; // Maps question ID to score
        let userInfo = {
            fullName: '',
            address: '',
            gradeSection: '',
            sex: ''
        };

        // --- DOM ELEMENTS ---
        const appContainer = document.getElementById('app-container');

        // --- RENDER LOGIC ---
        function render() {
            let html = '';

            // PROGRESS BAR (Only show during test)
            if (currentState === 'test') {
                const progressPercentage = ((currentQIndex + 1) / questions.length) * 100;
                html += `
                    <div class="w-full bg-slate-100 h-2">
                        <div class="bg-indigo-600 h-2 transition-all duration-300" style="width: ${progressPercentage}%"></div>
                    </div>
                `;
            }

            html += `<div class="p-6 md:p-10 fade-in">`;

            if (currentState === 'intro') {
                html += renderIntro();
            } else if (currentState === 'test') {
                html += renderTest();
            } else if (currentState === 'results') {
                html += renderResults();
            }

            html += `</div>`;
            appContainer.innerHTML = html;
            
            // Initialize lucide icons for newly injected HTML
            lucide.createIcons();
        }

        function renderIntro() {
            return `
                <div class="text-center space-y-6 py-10">
                    <div class="mx-auto w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 mb-6">
                        <i data-lucide="brain" class="w-10 h-10"></i>
                    </div>
                    <h1 class="text-3xl md:text-4xl font-bold text-slate-900">
                        Multiple Intelligences Diagnostic Test
                    </h1>
                    <p class="text-lg text-slate-600 max-w-xl mx-auto">
                        Discover your unique learning style and cognitive strengths based on Howard Gardner's Theory of Multiple Intelligences. 
                    </p>
                    <div class="bg-slate-50 rounded-xl p-6 text-left max-w-xl mx-auto border border-slate-100 shadow-sm">
                        <h3 class="font-semibold mb-2">Instructions:</h3>
                        <ul class="list-disc pl-5 space-y-2 text-slate-600 text-sm">
                            <li>You will be presented with ${questions.length} statements.</li>
                            <li>Rate how strongly you agree or disagree with each statement.</li>
                            <li>Answer honestly based on how you actually feel, not how you think you should feel.</li>
                            <li>Takes approximately 3-5 minutes.</li>
                        </ul>
                    </div>

                    <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm text-left max-w-xl mx-auto mt-6 space-y-4">
                        <h3 class="font-semibold mb-2 text-slate-800 border-b border-slate-100 pb-2">Student Information:</h3>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
                            <input type="text" id="input-fullname" class="block w-full rounded-md shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border border-slate-300 outline-none transition-colors" placeholder="Enter full name" value="${userInfo.fullName}">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Address</label>
                            <input type="text" id="input-address" class="block w-full rounded-md shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border border-slate-300 outline-none transition-colors" placeholder="Enter address" value="${userInfo.address}">
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Section, Grade Level</label>
                                <input type="text" id="input-grade" class="block w-full rounded-md shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border border-slate-300 outline-none transition-colors" placeholder="e.g. Section A, Grade 10" value="${userInfo.gradeSection}">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Sex</label>
                                <select id="input-sex" class="block w-full rounded-md shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border border-slate-300 outline-none transition-colors bg-white">
                                    <option value="" ${userInfo.sex === '' ? 'selected' : ''}>Select...</option>
                                    <option value="Male" ${userInfo.sex === 'Male' ? 'selected' : ''}>Male</option>
                                    <option value="Female" ${userInfo.sex === 'Female' ? 'selected' : ''}>Female</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <button 
                        onclick="startTest()"
                        class="mt-8 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-8 rounded-full shadow-lg shadow-indigo-200 transition-all hover:scale-105 active:scale-95 cursor-pointer"
                    >
                        Start Diagnostic Assessment
                    </button>
                </div>
            `;
        }

        function renderTest() {
            const currentQuestion = questions[currentQIndex];
            const currentAnswer = answers[currentQuestion.id];

            let optionsHtml = options.map(opt => {
                const isSelected = currentAnswer === opt.val;
                return `
                    <button
                        onclick="handleAnswer(${opt.val})"
                        class="flex flex-col items-center justify-center py-4 px-2 bg-white border-2 rounded-xl transition-all group cursor-pointer
                        ${isSelected ? 'border-indigo-500 bg-indigo-50' : 'border-slate-200 hover:border-indigo-500 hover:bg-indigo-50'}"
                    >
                        <div class="w-6 h-6 rounded-full border-2 mb-2 transition-colors
                            ${isSelected ? 'bg-indigo-500 border-indigo-500' : 'border-slate-300 group-hover:border-indigo-500 group-hover:bg-indigo-500'}">
                        </div>
                        <span class="text-sm font-medium text-center ${isSelected ? 'text-indigo-700' : 'text-slate-600 group-hover:text-indigo-700'}">
                            ${opt.label}
                        </span>
                    </button>
                `;
            }).join('');

            return `
                <div class="py-6 min-h-[400px] flex flex-col">
                    <div class="flex justify-between items-center mb-8 text-sm text-slate-400 font-medium">
                        <span>Question ${currentQIndex + 1} of ${questions.length}</span>
                        <span class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full">
                            Diagnostic Progress
                        </span>
                    </div>
                    
                    <div class="flex-grow flex flex-col justify-center">
                        <h2 class="text-2xl md:text-3xl font-medium text-slate-800 text-center mb-12 leading-relaxed">
                            "${currentQuestion.text}"
                        </h2>

                        <div class="grid grid-cols-1 md:grid-cols-5 gap-3 mt-auto">
                            ${optionsHtml}
                        </div>
                    </div>

                    <div class="mt-8 pt-6 border-t border-slate-100 flex justify-between">
                        <button 
                            onclick="handlePrevious()"
                            ${currentQIndex === 0 ? 'disabled' : ''}
                            class="flex items-center text-sm font-medium px-4 py-2 rounded-lg transition-colors cursor-pointer
                            ${currentQIndex === 0 ? 'text-slate-300 cursor-not-allowed' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-800'}"
                        >
                            <i data-lucide="chevron-left" class="w-4 h-4 mr-1"></i> Previous
                        </button>
                    </div>
                </div>
            `;
        }

        function renderResults() {
            // Calculate Scores
            const scores = {
                Linguistic: 0, Logical: 0, Spatial: 0, Kinesthetic: 0,
                Musical: 0, Interpersonal: 0, Intrapersonal: 0, Naturalist: 0
            };
            const maxCategoryScore = 15; // 3 questions * 5 max points

            questions.forEach(q => {
                if (answers[q.id]) {
                    scores[q.category] += answers[q.id];
                }
            });

            // Format, calculate percentage, and sort
            const finalScores = Object.entries(scores).map(([category, score]) => ({
                category,
                score,
                percentage: Math.round((score / maxCategoryScore) * 100),
                ...intelligenceDetails[category]
            })).sort((a, b) => b.percentage - a.percentage);

            const top3 = finalScores.slice(0, 3);

            let top3Html = top3.map((item, idx) => `
                <div class="${idx === 0 ? 'bg-indigo-50 border-indigo-100' : 'bg-slate-50 border-slate-100'} border rounded-xl p-5 relative overflow-hidden print-break-inside-avoid">
                    <div class="flex items-center gap-3 mb-3 relative z-10">
                        <div class="p-2 rounded-lg ${item.color} text-white print-exact">
                            <i data-lucide="${item.icon}" class="w-6 h-6"></i>
                        </div>
                        <div>
                            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider">
                                ${idx === 0 ? 'Primary' : `Secondary #${idx}`}
                            </div>
                            <div class="font-bold text-lg text-slate-800">${item.category}</div>
                        </div>
                    </div>
                    <div class="text-3xl font-bold text-slate-800 mb-2 relative z-10">${item.percentage}%</div>
                    <p class="text-sm text-slate-600 relative z-10">${item.description}</p>
                    
                    ${idx === 0 ? `<div class="absolute top-0 right-0 w-24 h-24 bg-indigo-500 opacity-5 rounded-bl-full print:hidden"></div>` : ''}
                </div>
            `).join('');

            let breakdownHtml = finalScores.map(item => `
                <div class="group print-break-inside-avoid">
                    <div class="flex justify-between items-end mb-1">
                        <div class="flex items-center gap-2">
                            <i data-lucide="${item.icon}" class="w-5 h-5 ${item.textColor}"></i>
                            <span class="font-semibold text-slate-700">${item.category}</span>
                        </div>
                        <span class="text-sm font-bold text-slate-500">${item.percentage}%</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-3 mb-1 overflow-hidden print-exact">
                        <div 
                            class="h-3 rounded-full ${item.color} print-exact"
                            style="width: ${item.percentage}%"
                        ></div>
                    </div>
                    <p class="text-xs text-slate-500 pl-7 hidden group-hover:block transition-all print:block">
                        ${item.description}
                    </p>
                </div>
            `).join('');

            return `
                <div class="py-4">
                    <div class="text-center mb-8 print:mb-6">
                        <div class="mx-auto w-16 h-16 bg-green-100 rounded-full flex items-center justify-center text-green-600 mb-4 print-exact print:hidden">
                            <i data-lucide="check-circle-2" class="w-8 h-8"></i>
                        </div>
                        <h2 class="text-3xl font-bold text-slate-900">Your Intelligence Profile</h2>
                        <p class="text-slate-500 mt-2 print:hidden">Based on your responses, here are your dominant intelligences.</p>
                    </div>

                    <div class="text-left mb-8 bg-slate-50 p-5 rounded-xl border border-slate-200 print-exact print-break-inside-avoid shadow-sm">
                        <h3 class="font-bold text-lg border-b border-slate-200 pb-2 mb-3 text-slate-800">Student Profile</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-y-3 gap-x-6 text-sm">
                            <div><span class="font-semibold text-slate-500 inline-block w-24">Name:</span> <span class="font-bold text-slate-800 text-base border-b border-slate-300 inline-block min-w-[150px] pb-1">${userInfo.fullName || 'N/A'}</span></div>
                            <div><span class="font-semibold text-slate-500 inline-block w-24">Sex:</span> <span class="font-medium text-slate-800 border-b border-slate-300 inline-block min-w-[150px] pb-1">${userInfo.sex || 'N/A'}</span></div>
                            <div><span class="font-semibold text-slate-500 inline-block w-24">Sec/Grade:</span> <span class="font-medium text-slate-800 border-b border-slate-300 inline-block min-w-[150px] pb-1">${userInfo.gradeSection || 'N/A'}</span></div>
                            <div><span class="font-semibold text-slate-500 inline-block w-24">Address:</span> <span class="font-medium text-slate-800 border-b border-slate-300 inline-block min-w-[150px] pb-1">${userInfo.address || 'N/A'}</span></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
                        ${top3Html}
                    </div>

                    <h3 class="font-bold text-xl text-slate-800 mb-6 mt-8">Complete Breakdown</h3>
                    <div class="space-y-6">
                        ${breakdownHtml}
                    </div>

                    <div class="mt-12 border-t border-slate-100 pt-8 flex flex-col sm:flex-row justify-center items-center gap-4 print:hidden">
                        <button 
                            onclick="startTest()"
                            class="inline-flex items-center gap-2 text-indigo-600 font-semibold hover:text-indigo-800 transition-colors bg-indigo-50 px-6 py-3 rounded-full hover:bg-indigo-100 w-full sm:w-auto justify-center cursor-pointer"
                        >
                            <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Retake Diagnostic
                        </button>
                        <button 
                            onclick="window.print()"
                            class="inline-flex items-center gap-2 text-white font-semibold transition-colors bg-indigo-600 px-6 py-3 rounded-full hover:bg-indigo-700 shadow-md hover:shadow-lg w-full sm:w-auto justify-center cursor-pointer print-exact"
                        >
                            <i data-lucide="download" class="w-4 h-4"></i> Export Report (PDF)
                        </button>
                    </div>
                </div>
            `;
        }

        // --- ACTIONS ---
        window.startTest = function() {
            // Save user info before starting
            userInfo.fullName = document.getElementById('input-fullname')?.value || '';
            userInfo.address = document.getElementById('input-address')?.value || '';
            userInfo.gradeSection = document.getElementById('input-grade')?.value || '';
            userInfo.sex = document.getElementById('input-sex')?.value || '';

            currentState = 'test';
            currentQIndex = 0;
            answers = {};
            render();
        };

        window.handleAnswer = function(score) {
            const qId = questions[currentQIndex].id;
            answers[qId] = score;
            
            // Move to next question or results after a tiny delay for UX
            setTimeout(() => {
                if (currentQIndex < questions.length - 1) {
                    currentQIndex++;
                } else {
                    currentState = 'results';
                }
                render();
            }, 150);
        };

        window.handlePrevious = function() {
            if (currentQIndex > 0) {
                currentQIndex--;
                render();
            }
        };

        // --- INITIALIZE ---
        render();

    </script>
</body>
</html>
